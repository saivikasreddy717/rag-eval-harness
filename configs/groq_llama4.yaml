# -----------------------------------------------------------------------
# Default config: Groq API + Llama 4 Scout (free tier)
#
# Requirements:
#   GROQ_API_KEY   - free at https://console.groq.com
#   COHERE_API_KEY - free tier at https://cohere.com (1,000 reranks/month)
#
# Cost estimate for full 500-question benchmark: ~$0 (free tier)
# -----------------------------------------------------------------------

dataset:
  name: hotpotqa
  split: validation
  sample_size: 500
  seed: 42

retrieval:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  top_k_rerank: 20

generator:
  provider: groq
  model: meta-llama/llama-4-scout-17b-16e-instruct
  temperature: 0.1
  max_tokens: 512

judge:
  provider: groq
  model: llama-3.3-70b-versatile
  temperature: 0.0
  max_tokens: 1024

embeddings:
  provider: local
  model: BAAI/bge-large-en-v1.5  # downloads once (~335MB), then cached
  batch_size: 32

reranker:
  provider: cohere
  model: rerank-english-v3.0
  top_n: 5
  enabled: true

strategies:
  - naive
  - hybrid
  - rerank
  - hyde
  - multi_query

output:
  dir: results
  predictions: true
  scorecard: true
  report: true
