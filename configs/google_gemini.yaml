# -----------------------------------------------------------------------
# Google Gemini config: Gemini 2.0 Flash generator + judge
#
# Requirements:
#   GOOGLE_API_KEY - free tier at https://aistudio.google.com
#   COHERE_API_KEY - free tier at https://cohere.com
#
# Install extra: uv sync --extra google
#
# Cost estimate for full 500-question benchmark: ~$0
#   (Gemini 2.0 Flash has a generous free tier: 1M tokens/day)
# -----------------------------------------------------------------------

dataset:
  name: hotpotqa
  split: validation
  sample_size: 500
  seed: 42

retrieval:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  top_k_rerank: 20

generator:
  provider: google
  model: gemini-2.0-flash
  temperature: 0.1
  max_tokens: 512

judge:
  provider: google
  model: gemini-2.0-flash
  temperature: 0.0
  max_tokens: 1024

embeddings:
  provider: local
  model: BAAI/bge-large-en-v1.5
  batch_size: 32

reranker:
  provider: cohere
  model: rerank-english-v3.0
  top_n: 5
  enabled: true

strategies:
  - naive
  - hybrid
  - rerank
  - hyde
  - multi_query

output:
  dir: results
  predictions: true
  scorecard: true
  report: true
